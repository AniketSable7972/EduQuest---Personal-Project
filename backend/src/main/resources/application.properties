spring.application.name=eduquest
server.port=8080

spring.data.mongodb.uri=mongodb://localhost:27017/eduquest
spring.data.mongodb.auto-index-creation=true

jwt.secret=EduQuestSecretKeyForJWTTokenGenerationMustBeLongEnough2024
jwt.expiration=86400000

app.cors.allowed-origins=http://localhost:5173
